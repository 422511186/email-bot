# 全局配置
poll_interval: 60s
api:
  address: "127.0.0.1:8080"

# 需要被轮询增量拉取邮件的源邮箱列表
sources:
  - id: "source1"
    host: "imap.qq.com:993"
    username: "your-email@qq.com"
    password: "your-auth-code" # 授权码，而非登录密码
  - id: "source2"
    host: "imap.163.com:993"
    username: "your-email@163.com"
    password: "your-auth-code"

# 目标邮箱列表（用于转发的SMTP服务器及账号信息）
targets:
  - id: "target1"
    host: "smtp.qq.com:465"
    username: "your-forwarder@qq.com"
    password: "your-auth-code"
    email: "your-forwarder@qq.com" # 发件人邮箱，通常和username一致
  - id: "target2"
    host: "smtp.gmail.com:465"
    username: "your-forwarder@gmail.com"
    password: "your-auth-code"
    email: "your-forwarder@gmail.com"

# 转发路由规则，支持一对多、多对多
rules:
  # 规则1：将 source1 的新邮件，转发给 target1 和 target2（一对多）
  - id: "rule1"
    sources:
      - "source1"
    targets:
      - "target1"
      - "target2"
  
  # 规则2：将 source1 和 source2 的新邮件，统一汇总转发给 target1（多对一 / 多对多）
  - id: "rule2"
    sources:
      - "source1"
      - "source2"
    targets:
      - "target1"
